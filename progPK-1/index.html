<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню программ</title>
<style>
html, body {
  height: 100%;
  overflow-y: auto; /* вертикальная прокрутка */
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: #f0f0f0;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
.program-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 900px;
  margin: 0 auto;
}
.program-card {
  display: flex;
  align-items: center;
  padding: 10px;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #ccc;
  transition: 0.2s;
}
.program-card:hover {
  background: #f0f9ff;
  border-color: #93c5fd;
}
.program-card img {
  width: 50px;
  height: 50px;
  margin-right: 12px;
  border-radius: 6px;
  object-fit: contain;
  background: #fff;
  border: 1px solid #ddd;
  padding: 4px;
}
.program-info {
  flex: 1;
}
.program-info strong {
  display: block;
  font-size: 16px;
  margin-bottom: 4px;
}
.program-info small {
  color: #555;
}
.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.download-btn {
  padding: 6px 12px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}
.download-btn:hover {
  background: #15803d;
}
@media (max-width: 600px) {
  .program-card {
    flex-direction: column;
    align-items: flex-start;
  }
  .program-card img {
    margin-bottom: 8px;
  }
  .btn-group {
    width: 100%;
  }
  .download-btn {
    width: 100%;
    text-align: center;
    margin-top: 8px;
  }
}


/* Футер и анимация автора */
footer {
  text-align: center;
  margin-top: 40px;
  font-size: 14px;
}
.author-link {
  display: inline-block;
  color: #888; /* серый */
  text-decoration: none;
  padding: 4px 8px;
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  transition: color 0.3s ease;
  animation: floatColor 3s infinite alternate;
}
.author-link:hover {
  cursor: pointer;
}
@keyframes floatColor {
  0% { transform: translateX(0); color: #888; }
  50% { transform: translateX(10px); color: #fff; }
  100% { transform: translateX(0); color: #888; }
}
</style>
</head>
<body>

<h1>Меню программ</h1>
<div class="program-list" id="programList"></div>

<!-- VK Bridge -->
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<script>
  // Инициализация VK Mini Apps
  vkBridge.send('VKWebAppInit')
    .then(() => console.log('VK Bridge инициализирован'))
    .catch(err => console.error('Ошибка инициализации VK Bridge', err));
</script>

<script>
const programs = [
  { name:"SumatraPDF", icon:"icons/sumatrapdf.png", url:"https://www.sumatrapdfreader.org", description:"Лёгкая и быстрая программа для просмотра PDF, DJVU и EPUB." },
  { name:"OpenOffice", icon:"icons/openoffice.png", url:"https://openoffice.apache.org", description:"Бесплатный офисный пакет для документов и таблиц." },
  { name:"LibreOffice", icon:"icons/libreoffice.png", url:"https://www.libreoffice.org", description:"Современный офисный пакет с поддержкой форматов Microsoft." },
  { name:"FastStone Capture", icon:"icons/FastStone.png", url:"https://www.faststone.org/FSCaptureDetail.htm", description:"Программа для создания скриншотов и записи видео с экрана.", key: "AXRQS-RHMSV-FXCHR-PDURO", usernameRequired: true, user: "Triniti school" },
  { name:"AIMP", icon:"icons/aimp.png", url:"https://www.aimp.ru", description:"Музыкальный плеер с эквалайзером и плейлистами." },
  { name:"Audacity", icon:"icons/audacity.png", url:"https://www.softportal.com/software-12584-audacity.html", description:"Запись и редактирование звука, подкастов и музыки." },
  { name:"Media Player Classic", icon:"icons/mpc.png", url:"https://codecguide.com", description:"Лёгкий видеоплеер без лишних функций." },
  { name:"VLC media player", icon:"icons/vlc.png", url:"https://www.videolan.org", description:"Универсальный плеер для видео и аудио." },
  { name:"FxSound", icon:"icons/fxsound.png", url:"https://www.softportal.com/software-44231-fxsound.html", description:"Улучшение качества звука в наушниках и колонках." },
  { name:"Format Factory", icon:"icons/formatfactory.png", url:"https://www.softportal.com/software-9536-format-factory.html", description:"Конвертация видео, аудио и изображений." },
  { name:"XnView Classic", icon:"icons/xnview.png", url:"https://www.xnview.com/en/xnview", description:"Просмотр, сортировка и базовая обработка изображений." },
  { name:"IrfanView", icon:"icons/irfanview.png", url:"https://www.irfanview.com", description:"Быстрый просмотр и простое редактирование изображений." },
  { name:"Everything", icon:"icons/everything.png", url:"https://www.voidtools.com", description:"Мгновенный поиск файлов на компьютере." },
  { name:"Windows 10", icon:"icons/windows10.png", url:"https://www.comss.ru/page.php?id=2572", description:"Операционная система Microsoft Windows 10." },
  { name:"Windows 11", icon:"icons/windows11.png", url:"https://www.comss.ru/page.php?id=9234", description:"Новая версия Windows 11 с современным дизайном." },
  { name:"7-Zip", icon:"icons/7zip.png", url:"https://www.comss.ru/page.php?id=2022", description:"Архиватор для сжатия и распаковки файлов." },
  { name:"Paint.net", icon:"icons/Paint.png", url:"https://www.getpaint.net/download.html", description:"Программа для редактирования изображений и фотографий на Windows." }
];

const programList = document.getElementById('programList');

programs.forEach(p => {
  const card = document.createElement('div');
  card.className = 'program-card';
  
  // Кнопка показа ключа, если есть
  let keyButton = '';
  if (p.key) {
    if (p.usernameRequired) {
      keyButton = `<button class="download-btn" onclick="alert('Программа: ${p.name}\\nИмя пользователя: ${p.user}\\nКлюч активации: ${p.key}')">Показать ключ</button>`;
    } else {
      keyButton = `<button class="download-btn" onclick="alert('Программа: ${p.name}\\nКлюч активации: ${p.key}')">Показать ключ</button>`;
    }
  }

  card.innerHTML = `
    <img src="${p.icon}" alt="${p.name}">
    <div class="program-info">
      <strong>${p.name}</strong>
      <small>${p.description}</small>
    </div>
    <div class="btn-group">
      <button class="download-btn" onclick="window.open('${p.url}', '_blank')">Скачать</button>
      ${keyButton}
    </div>
  `;
  programList.appendChild(card);
});
</script>

  <footer>
  <a href="https://vk.com/muzer_play" target="_blank" class="author-link">Автор приложения</a>
</footer>

</body>
</html>
