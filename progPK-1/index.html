<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню программ</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; }
.program-list { display: flex; flex-direction: column; gap: 12px; max-width: 900px; margin: 0 auto; }
.program-card { display: flex; align-items: center; padding: 10px; border-radius: 8px; background: #fff; border: 1px solid #ccc; transition: 0.2s; }
.program-card:hover { background: #f0f9ff; border-color: #93c5fd; }
.program-card img { width: 50px; height: 50px; margin-right: 12px; border-radius: 6px; object-fit: contain; background: #fff; border: 1px solid #ddd; padding: 4px; }
.program-info { flex: 1; }
.program-info strong { display: block; font-size: 16px; margin-bottom: 4px; }
.program-info small { color: #555; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.download-btn { padding: 6px 12px; background: #16a34a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
.download-btn:hover { background: #15803d; }
@media (max-width: 600px) {
  .program-card { flex-direction: column; align-items: flex-start; }
  .program-card img { margin-bottom: 8px; }
  .btn-group { width: 100%; }
  .download-btn { width: 100%; text-align: center; margin-top: 8px; }
}
</style>
</head>
<body>

<h1>Меню программ</h1>
<div class="program-list" id="programList"></div>

  <!-- VK Bridge -->
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<script>
  // Инициализация VK Mini Apps
  vkBridge.send('VKWebAppInit')
    .then(() => console.log('VK Bridge инициализирован'))
    .catch(err => console.error('Ошибка инициализации VK Bridge', err));
</script>
  
<script>
const programs = [
  { name:"SumatraPDF", icon:"icons/sumatrapdf.png", url:"https://www.sumatrapdfreader.org", description:"Лёгкая и быстрая программа для просмотра PDF, DJVU и EPUB.", key: "" },
  { name:"OpenOffice", icon:"icons/openoffice.png", url:"https://openoffice.apache.org", description:"Бесплатный офисный пакет для документов и таблиц.", key: "" },
  { name:"LibreOffice", icon:"icons/libreoffice.png", url:"https://www.libreoffice.org", description:"Современный офисный пакет с поддержкой форматов Microsoft.", key: "" },
  { name:"FastStone Capture", icon:"icons/FastStone.png", url:"https://www.faststone.org/FSCaptureDetail.htm", description:"Программа для создания скриншотов и записи видео с экрана.", key: "AXRQS-RHMSV-FXCHR-PDURO", usernameRequired: true, user: "Triniti school" },
  { name:"AIMP", icon:"icons/aimp.png", url:"https://www.aimp.ru", description:"Музыкальный плеер с эквалайзером и плейлистами.", key: "" },
  { name:"Audacity", icon:"icons/audacity.png", url:"https://www.softportal.com/software-12584-audacity.html", description:"Запись и редактирование звука, подкастов и музыки.", key: "" },
  { name:"Media Player Classic", icon:"icons/mpc.png", url:"https://codecguide.com", description:"Лёгкий видеоплеер без лишних функций.", key: "" },
  { name:"VLC media player", icon:"icons/vlc.png", url:"https://www.videolan.org", description:"Универсальный плеер для видео и аудио.", key: "" },
  { name:"FxSound", icon:"icons/fxsound.png", url:"https://www.softportal.com/software-44231-fxsound.html", description:"Улучшение качества звука в наушниках и колонках.", key: "" },
  { name:"Format Factory", icon:"icons/formatfactory.png", url:"https://www.softportal.com/software-9536-format-factory.html", description:"Конвертация видео, аудио и изображений.", key: "" },
  { name:"XnView Classic", icon:"icons/xnview.png", url:"https://www.xnview.com/en/xnview", description:"Просмотр, сортировка и базовая обработка изображений.", key: "" },
  { name:"IrfanView", icon:"icons/irfanview.png", url:"https://www.irfanview.com", description:"Быстрый просмотр и простое редактирование изображений.", key: "" },
  { name:"Everything", icon:"icons/everything.png", url:"https://www.voidtools.com", description:"Мгновенный поиск файлов на компьютере.", key: "" },
  { name:"Windows 10", icon:"icons/windows10.png", url:"https://www.comss.ru/page.php?id=2572", description:"Операционная система Microsoft Windows 10.", key: "" },
  { name:"Windows 11", icon:"icons/windows11.png", url:"https://www.comss.ru/page.php?id=9234", description:"Новая версия Windows 11 с современным дизайном.", key: "" },
  { name:"7-Zip", icon:"icons/7zip.png", url:"https://www.comss.ru/page.php?id=2022", description:"Архиватор для сжатия и распаковки файлов.", key: "" },
  { name:"Paint.net", icon:"icons/Paint.png", url:"https://www.getpaint.net/download.html", description:"Программа для редактирования изображений и фотографий на Windows.", key: "" }
];

const programList = document.getElementById('programList');

programs.forEach(p => {
  const card = document.createElement('div');
  card.className = 'program-card';
  
  // Кнопка показа ключа
  let keyButton = '';
  if (p.key) {
    if (p.usernameRequired) {
      keyButton = `<button class="download-btn" onclick="alert('Программа: ${p.name}\\nИмя пользователя: ${p.user}\\nКлюч активации: ${p.key}')">Показать ключ</button>`;
    } else {
      keyButton = `<button class="download-btn" onclick="alert('Программа: ${p.name}\\nКлюч активации: ${p.key}')">Показать ключ</button>`;
    }
  }

  card.innerHTML = `
    <img src="${p.icon}" alt="${p.name}">
    <div class="program-info">
      <strong>${p.name}</strong>
      <small>${p.description}</small>
    </div>
    <div class="btn-group">
      <button class="download-btn" onclick="window.open('${p.url}', '_blank')">Скачать</button>
      ${keyButton}
    </div>
  `;
  programList.appendChild(card);
});
</script>

</body>
</html>
